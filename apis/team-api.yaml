openapi: 3.1.0
info:
  title: Aruba Team Fleet API – Evaluation Contract
  version: 2.0.1
paths:
  /health:
    get:
      tags: [base]
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /openapi.yaml:
    get:
      tags: [base]
      summary: Get Contract
      operationId: get_contract_openapi_yaml_get
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
  /vehicles/status:
    get:
      tags: [base]
      summary: Vehicle Status
      operationId: vehicle_status_vehicles_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleStatusSummary'
  /ask:
    get:
      tags: [base]
      summary: Ask Fleet
      operationId: ask_fleet_ask_get
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            title: Q
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /vehicles:
    get:
      tags: [vehicles]
      summary: List Vehicles
      operationId: list_vehicles_vehicles_get
      parameters:
        - name: type
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /vehicles/{vehicle_id}:
    get:
      tags: [vehicles]
      summary: Get Vehicle
      operationId: get_vehicle_vehicles__vehicle_id__get
      parameters:
        - name: vehicle_id
          in: path
          required: true
          schema:
            type: string
            title: Vehicle Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /weather-stations:
    get:
      tags: [weather]
      summary: List Weather Stations
      operationId: list_weather_stations_weather_stations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherStationsResponse'
  /weather-stations/{station_id}/reading:
    get:
      tags: [weather]
      summary: Get Reading
      operationId: get_reading_weather_stations__station_id__reading_get
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            title: Station Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherReading'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AskResponse:
      type: object
      title: AskResponse
      required: [answer]
      properties:
        answer:
          type: string
          title: Answer
        confidence:
          anyOf:
            - type: number
            - type: 'null'
          title: Confidence
        data:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          title: Data
    HTTPValidationError:
      type: object
      title: HTTPValidationError
      properties:
        detail:
          type: array
          title: Detail
          items:
            $ref: '#/components/schemas/ValidationError'
    HealthResponse:
      type: object
      title: HealthResponse
      required: [status]
      properties:
        status:
          type: string
          title: Status
          description: Status of the service
    ValidationError:
      type: object
      title: ValidationError
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          title: Location
          items:
            anyOf:
              - type: string
              - type: integer
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
    Vehicle:
      type: object
      title: Vehicle
      required: [id, type, status, latitude, longitude, fuel_level]
      properties:
        id:
          type: string
          title: Id
        type:
          type: string
          title: Type
        status:
          type: string
          title: Status
        latitude:
          type: number
          title: Latitude
        longitude:
          type: number
          title: Longitude
        fuel_level:
          type: number
          title: Fuel Level
        callsign:
          anyOf:
            - type: string
            - type: 'null'
          title: Callsign
        speed_kmh:
          anyOf:
            - type: number
            - type: 'null'
          title: Speed Kmh
        last_updated:
          anyOf:
            - type: string
            - type: 'null'
          title: Last Updated
        metadata:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
          title: Metadata
    VehicleStatusSummary:
      type: object
      title: VehicleStatusSummary
      required: [total, by_type, by_status]
      properties:
        total:
          type: integer
          title: Total
        by_type:
          type: object
          title: By Type
          additionalProperties:
            type: integer
        by_status:
          type: object
          title: By Status
          additionalProperties:
            type: integer
    VehiclesResponse:
      type: object
      title: VehiclesResponse
      required: [vehicles]
      properties:
        vehicles:
          type: array
          title: Vehicles
          items:
            $ref: '#/components/schemas/Vehicle'
    WeatherReading:
      type: object
      title: WeatherReading
      required: [temperature, humidity, wind_speed, timestamp]
      properties:
        temperature:
          type: number
          title: Temperature
        humidity:
          type: number
          title: Humidity
        wind_speed:
          type: number
          title: Wind Speed
        timestamp:
          type: string
          title: Timestamp
    WeatherStation:
      type: object
      title: WeatherStation
      required: [id, name, latitude, longitude]
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        latitude:
          type: number
          title: Latitude
        longitude:
          type: number
          title: Longitude
    WeatherStationsResponse:
      type: object
      title: WeatherStationsResponse
      required: [stations]
      properties:
        stations:
          type: array
          title: Stations
          items:
            $ref: '#/components/schemas/WeatherStation'
