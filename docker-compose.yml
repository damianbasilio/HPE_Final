services:
  digital-twin:
    build:
      context: .
      dockerfile: Dockerfile
    image: hpe52/digital-twin:latest
    container_name: hpe52-dt
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./users.json:/app/users.json:rw
      - ./flask_session:/app/flask_session:rw
      - ./logs:/app/logs:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
