<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ciudadano — Aruba Gemelo Digital</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/ciudadano.js') }}" defer></script>
</head>
<body>
  <main class="citizen">
    <header class="citizen-header">
      <h1>Estado de Aruba</h1>
      <p id="contexto-ciudadano">Cargando contexto...</p>
    </header>

    <section class="citizen-panel">
      <h2>Eventos recientes</h2>
      <div id="eventos-ciudadano" class="event-list"></div>
    </section>

    <section class="citizen-panel">
      <h2>Chat ciudadano</h2>
      <div id="chat-mensajes" class="chat-box"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Pregunta por eventos, rutas o alertas..." required />
        <button type="submit" class="btn btn-primary">Enviar</button>
      </form>
    </section>
  </main>
</body>
</html>
