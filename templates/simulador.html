{% extends "base.html" %}

{% block title %}Operador - Aruba Gemelo Digital{% endblock %}

{% block head_extra %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v=7">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
          onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';document.head.appendChild(s);"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="{{ url_for('static', filename='js/panel_flota.js') }}?v=7"></script>
  <script src="{{ url_for('static', filename='js/operador.js') }}?v=7"></script>
{% endblock %}

{% block content %}
<div class="dt-dashboard dt-dashboard-operador" data-consola="operador">
  <header class="dt-summary">
    <div class="dt-card">
      <span class="label">Total flota</span>
      <span class="value" id="flota-total">--</span>
    </div>
    <div class="dt-card">
      <span class="label">Activas</span>
      <span class="value" id="flota-activos">--</span>
    </div>
    <div class="dt-card actions">
      <button class="btn btn-ghost" data-apoyo="ambulancia">+ apoyo ambulancia</button>
      <button class="btn btn-ghost" data-apoyo="bomberos">+ apoyo bomberos</button>
      <button class="btn btn-ghost" data-apoyo="policia">+ apoyo policia</button>
      <button class="btn btn-ghost" data-apoyo="proteccion_civil">+ apoyo PC</button>
      <button class="btn btn-ghost" data-apoyo="dron">+ dron scout</button>
      <button class="btn btn-primary" id="btn-mensaje-central">Mensaje a flota</button>
      <span class="actions-divider" aria-hidden="true"></span>
      <button class="btn btn-ghost" id="btn-add-unit" title="Agregar unidad permanente a la flota (sin limite)">Agregar unidad</button>
      <button class="btn btn-danger" id="btn-remove-unit" title="Eliminar la unidad seleccionada">Eliminar seleccionada</button>
    </div>
  </header>

  <div class="dt-grid">
    <aside class="dt-side">
      <section class="panel">
        <h2>Unidades</h2>
        <div id="unidades-lista" class="vehicle-list"></div>
      </section>
      <section class="panel">
        <h2>Incidentes</h2>
        <div id="incidentes-lista" class="incidentes-list"></div>
      </section>
    </aside>

    <main class="dt-map-wrap">
      <div id="mapa-flota" class="dt-map"></div>
    </main>

    <aside class="dt-detail">
      <section class="panel">
        <h2>Detalle de unidad</h2>
        <div id="detalle-unidad" class="details-box">
          <p>Selecciona una unidad para ver detalles.</p>
        </div>
      </section>
      <section class="panel chat">
        <h2>Asistente NLP</h2>
        <div id="chat-mensajes" class="chat-box"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" placeholder="Pregunta sobre la flota o eventos..." required />
          <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
      </section>
    </aside>
  </div>
</div>
{% endblock %}
